name: cyber_bible_app
description: "A free/libre and open source software (FLOSS) Bible study app."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  xml: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Used by tools/build_bible_db.dart (CLI build tool only — never ships in the app).
  # On Windows: requires sqlite3.dll on PATH. Download sqlite-dll-win-x64 from
  # https://sqlite.org/download.html and place sqlite3.dll in your working directory.
  sqlite3: ^2.0.0
  # Used by tools/build_bible_db.dart for cross-platform path joining.
  # Declared explicitly so we don't rely on a transitive Flutter dependency.
  path: ^1.9.0

flutter:
  uses-material-design: true

  assets:
    - assets/bibles/
