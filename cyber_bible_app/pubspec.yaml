name: cyber_bible_app
description: "A free/libre and open source software (FLOSS) Bible study app."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  xml: ^6.5.0
  # sqflite: runtime SQLite access for reading the bundled Bible database.
  # Added in Step 1.6 so the dependency is ready for the app DB reader layer
  # introduced in Step 1.7+; BibleSetupService only copies the DB file.
  sqflite: ^2.4.2
  # path_provider: locates the app's writable Application Support directory on
  # each platform, where the bundled Bible database is copied on first launch.
  path_provider: ^2.1.5
  # path: cross-platform path joining used by BibleSetupService (lib/ code).
  # Also used by tools/build_bible_db.dart — declared here so both can share it.
  path: ^1.9.0
  # sqflite_common_ffi_web: Flutter Web SQLite support via WebAssembly backed by
  # IndexedDB. Resolves to 1.1.1. BibleService uses the no-worker factory
  # (databaseFactoryFfiWebNoWebWorker) to open the bundled Bible database via
  # IndexedDB. Run `dart run sqflite_common_ffi_web:setup` after adding to
  # generate web/sqlite3.wasm (required) and web/sqflite_sw.js (not used by
  # the no-worker variant, but harmless to keep).
  sqflite_common_ffi_web: ^1.0.2
  # sqflite_common: common sqflite interfaces; needed for the databaseFactory
  # global setter used in bible_service_web.dart. Declared as a direct dep to
  # satisfy the depend_on_referenced_packages lint.
  sqflite_common: ^2.5.6+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # sqlite3: used by tools/build_bible_db.dart (CLI build tool only, never
  # ships in the app). On Windows: also requires sqlite3.dll on PATH when
  # running the build tool — download sqlite-dll-win-x64 from
  # https://sqlite.org/download.html and place sqlite3.dll in the working
  # directory. Not needed for the app runtime; sqflite_common_ffi_web loads
  # the WASM build of sqlite3 separately at runtime.
  sqlite3: ^3.3.1
  # path is declared in dependencies (above) and is also used by the build tool.

flutter:
  uses-material-design: true

  assets:
    - assets/bibles/
