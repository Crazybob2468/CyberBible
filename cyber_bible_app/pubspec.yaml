name: cyber_bible_app
description: "A free/libre and open source software (FLOSS) Bible study app."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  xml: ^6.5.0
  # sqflite: runtime SQLite access for reading the bundled Bible database.
  # Added in Step 1.6 so the dependency is ready for the app DB reader layer
  # introduced in Step 1.7+; BibleSetupService only copies the DB file.
  sqflite: ^2.4.2
  # path_provider: locates the app's writable Application Support directory on
  # each platform, where the bundled Bible database is copied on first launch.
  path_provider: ^2.1.5
  # path: cross-platform path joining used by BibleSetupService (lib/ code).
  # Also used by tools/build_bible_db.dart — declared here so both can share it.
  path: ^1.9.0
  # sqflite_common_ffi_web: Flutter Web SQLite support via WebAssembly.
  # Resolves to 1.1.1. Required so BibleService can open the SQLite DB in the
  # browser using an InMemoryFileSystem VFS. Run
  # `dart run sqflite_common_ffi_web:setup` after adding to generate
  # web/sqlite3.wasm and web/sqflite_sw.js.
  sqflite_common_ffi_web: ^1.0.2
  # sqlite3: provides InMemoryFileSystem (VFS) and WasmSqlite3 used by
  # bible_service_web.dart to seed and open the in-memory database on web.
  # Moved from dev_dependencies in Step 1.7 because it is now used at runtime.
  sqlite3: ^3.3.1
  # sqflite_common: common sqflite interfaces; needed for the databaseFactory
  # global used in bible_service_web.dart. Declared as a direct dep to satisfy
  # the depend_on_referenced_packages lint.
  sqflite_common: ^2.5.6+1
  # typed_data: provides Uint8Buffer, which is the value type of
  # InMemoryFileSystem.fileData. Declared as a direct dep (was transitive).
  typed_data: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Used by tools/build_bible_db.dart (CLI build tool only — never ships in the app).
  # On Windows: requires sqlite3.dll on PATH. Download sqlite-dll-win-x64 from
  # https://sqlite.org/download.html and place sqlite3.dll in your working directory.
  # path is declared in dependencies (above) and is also used by the build tool.

flutter:
  uses-material-design: true

  assets:
    - assets/bibles/
